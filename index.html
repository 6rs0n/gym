<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warmup Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d0f;
      color: #f0ede8;
      font-family: 'Courier New', monospace;
      padding: 2rem 1.5rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }

    .eyebrow {
      font-size: 11px; letter-spacing: 4px; color: #666;
      text-transform: uppercase; margin-bottom: 6px;
    }
    h1 {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 900;
      font-family: Georgia, serif;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 2rem;
    }
    h1 span { color: #e63946; }

    .card {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card label {
      font-size: 11px; letter-spacing: 3px; color: #888;
      display: block; margin-bottom: 10px;
    }
    .input-row { display: flex; gap: 10px; align-items: center; }
    #weight-input {
      flex: 1;
      background: #0d0d0f;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #f0ede8;
      font-size: 24px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    #weight-input:focus { border-color: #e63946; }
    .unit-btns { display: flex; flex-direction: column; gap: 6px; }
    .unit-btn {
      background: #222; border: none; border-radius: 6px;
      padding: 0.35rem 0.7rem; color: #888;
      font-size: 12px; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      transition: all 0.15s; font-family: 'Courier New', monospace;
    }
    .unit-btn.active { background: #e63946; color: #fff; }

    .toggle-row { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
    .toggle {
      width: 36px; height: 20px; border-radius: 10px;
      background: #333; cursor: pointer;
      transition: background 0.2s; position: relative;
      flex-shrink: 0;
    }
    .toggle.on { background: #e63946; }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; transition: left 0.2s;
    }
    .toggle.on .toggle-knob { left: 19px; }
    .toggle-label { font-size: 12px; color: #888; }

    .sets { display: flex; flex-direction: column; gap: 8px; }
    .set-card {
      background: #18181b;
      border: 1px solid #1e1e21;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      opacity: 0.4;
      transition: opacity 0.3s;
      border-left: 3px solid #555;
    }
    .set-card.active { opacity: 1; border-color: #2a2a2e; }
    .set-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .set-meta { font-size: 11px; color: #666; letter-spacing: 2px; }
    .set-reps { font-size: 11px; color: #888; }
    .set-weight { font-size: 22px; font-weight: 800; color: #f0ede8; }
    .set-weight span { font-size: 12px; color: #666; }

    .working-card {
      background: #1a0a0c;
      border: 2px solid #e63946;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 4px;
      display: none;
    }
    .working-card.active { display: block; }
    .working-header { display: flex; justify-content: space-between; align-items: center; }
    .working-label { font-size: 11px; color: #e63946; letter-spacing: 3px; }
    .working-sub { font-size: 11px; color: #888; margin-top: 2px; }
    .working-weight { font-size: 28px; font-weight: 900; color: #e63946; }
    .working-weight span { font-size: 13px; }

    .plate-visual { display: flex; align-items: center; gap: 2px; margin-top: 8px; }
    .bar-stub { height: 10px; background: #777; border-radius: 4px; width: 70px; }
    .plate {
      border-radius: 3px;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
      width: 14px;
    }
    .plate-info { font-size: 10px; color: #555; margin-top: 4px; }
    .working-card .plate-info { color: #773; }

    .empty-state {
      text-align: center; margin-top: 40px;
      color: #444; font-size: 13px; letter-spacing: 1px;
    }
    .footer {
      margin-top: 32px; font-size: 10px;
      color: #333; letter-spacing: 1px; line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Warmup Protocol</div>
  <h1>RAMP UP<br><span>CALCULATOR</span></h1>

  <div class="card">
    <label>WORKING / HEAVY SET WEIGHT</label>
    <div class="input-row">
      <input id="weight-input" type="number" inputmode="decimal" placeholder="e.g. 225" />
      <div class="unit-btns">
        <button class="unit-btn active" data-unit="lbs">LBS</button>
        <button class="unit-btn" data-unit="kg">KG</button>
      </div>
    </div>
    <div class="toggle-row">
      <div class="toggle on" id="bar-toggle">
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-label" id="bar-label">Include bar weight (45 lbs)</span>
    </div>
  </div>

  <div class="sets" id="sets-container">
    <div class="set-card" id="set-0" style="border-left-color:#888">
      <div class="set-header">
        <div><span class="set-meta">50% — </span><span class="set-reps">5 reps</span></div>
        <div class="set-weight" id="w0">— <span class="unit-display">lbs</span></div>
      </div>
      <div id="plates-0"></div>
    </div>
    <div class="set-card" id="set-1" style="border-left-color:#e07050">
      <div class="set-header">
        <div><span class="set-meta">75% — </span><span class="set-reps">3 reps</span></div>
        <div class="set-weight" id="w1">— <span class="unit-display">lbs</span></div>
      </div>
      <div id="plates-1"></div>
    </div>

    <div class="working-card" id="working-card">
      <div class="working-header">
        <div>
          <div class="working-label">WORKING WEIGHT</div>
          <div class="working-sub">100% — Your heavy set</div>
        </div>
        <div class="working-weight" id="ww-display">— <span class="unit-display">lbs</span></div>
      </div>
      <div id="plates-working"></div>
    </div>
  </div>

  <div class="empty-state" id="empty-state">ENTER YOUR WORKING WEIGHT ABOVE ↑</div>

  <div class="footer" id="footer">
    PROTOCOL: 50% → 75% → 100%<br />
    Weights rounded to nearest 5 <span class="unit-display">lbs</span> (2.5 per side)
  </div>
</div>

<script>
  const PLATES = [45, 35, 25, 10, 5, 2.5];
  const PLATE_COLORS = { 45:"#e63946", 35:"#457b9d", 25:"#f4a261", 10:"#2a9d8f", 5:"#8338ec", 2.5:"#aaa" };
  const PLATE_HEIGHTS = { 45:44, 35:38, 25:32, 10:22, 5:18, 2.5:14 };

  let unit = "lbs";
  let barIncluded = true;

  function getBar() { return barIncluded ? (unit === "lbs" ? 45 : 20) : 0; }

  function round5(w) { return Math.round(w / 5) * 5; }

  function platesPerSide(total, bar) {
    let rem = (total - bar) / 2;
    if (rem <= 0) return [];
    const out = [];
    for (const p of PLATES) {
      while (rem >= p - 0.01) { out.push(p); rem -= p; rem = Math.round(rem * 100) / 100; }
    }
    return out;
  }

  function renderPlates(containerId, plates, isWorking) {
    const el = document.getElementById(containerId);
    if (!plates) { el.innerHTML = ""; return; }
    let html = '<div class="plate-visual"><div class="bar-stub"></div>';
    if (plates.length === 0) {
      html += '<span style="font-size:11px;color:#888;margin-left:6px">bar only</span>';
    } else {
      plates.forEach(p => {
        const h = PLATE_HEIGHTS[p] || 20;
        const c = PLATE_COLORS[p] || "#999";
        html += `<div class="plate" style="height:${h}px;background:${c}"></div>`;
      });
    }
    html += '</div>';
    if (plates.length > 0) {
      const color = isWorking ? "#773" : "#555";
      html += `<div class="plate-info" style="color:${color}">Each side: ${plates.join(" + ")} ${unit}</div>`;
    }
    el.innerHTML = html;
  }

  function update() {
    const ww = parseFloat(document.getElementById("weight-input").value) || 0;
    const bar = getBar();
    const hasWeight = ww > 0;

    document.getElementById("empty-state").style.display = hasWeight ? "none" : "block";
    document.getElementById("working-card").classList.toggle("active", hasWeight);

    const pcts = [0.50, 0.75];
    pcts.forEach((pct, i) => {
      const raw = Math.max(round5(ww * pct), bar);
      document.getElementById(`set-${i}`).classList.toggle("active", hasWeight);
      document.getElementById(`w${i}`).childNodes[0].textContent = hasWeight ? raw + " " : "— ";
      renderPlates(`plates-${i}`, hasWeight ? platesPerSide(raw, bar) : null, false);
    });

    if (hasWeight) {
      document.getElementById("ww-display").childNodes[0].textContent = ww + " ";
      renderPlates("plates-working", platesPerSide(ww, bar), true);
    }

    // update unit labels
    document.querySelectorAll(".unit-display").forEach(el => el.textContent = unit);
    document.getElementById("bar-label").textContent =
      `Include bar weight (${unit === "lbs" ? "45 lbs" : "20 kg"})`;
  }

  document.getElementById("weight-input").addEventListener("input", update);

  document.querySelectorAll(".unit-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      unit = btn.dataset.unit;
      document.querySelectorAll(".unit-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      update();
    });
  });

  document.getElementById("bar-toggle").addEventListener("click", function() {
    barIncluded = !barIncluded;
    this.classList.toggle("on", barIncluded);
    update();
  });
</script>
</body>
</html>
